services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: squadron_ops
      POSTGRES_PASSWORD: squadron_ops_dev
      POSTGRES_DB: squadron_ops
    ports:
      - "5433:5432"
    volumes:
      - squadron_ops_db:/var/lib/postgresql/data

volumes:
  squadron_ops_db:
